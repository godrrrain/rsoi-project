<!DOCTYPE html>
<html>

<head>
    <title>Books App - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .error {
            color: #e74c3c;
            margin-bottom: 15px;
            padding: 10px;
            background: #fadbd8;
            border-radius: 5px;
            display: none;
        }

        .success {
            color: #27ae60;
            margin-bottom: 15px;
            padding: 10px;
            background: #d5f4e6;
            border-radius: 5px;
            display: none;
        }

        .user-info {
            display: none;
            background: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .user-info p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .logout-btn {
            background: #e74c3c;
            margin-top: 15px;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .signup-link {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📚 Books App</h1>

        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>

        <div id="loginForm">
            <div class="form-group">
                <p>To access the Books App, sign in with the Identity Provider.</p>
            </div>
            <button type="button" onclick="handleLogin(event)">Login with IdP</button>
            <div class="signup-link">
                Don't have an account? <a href="#" onclick="goToSignup(); return false;">Sign up</a>
            </div>
        </div>

        <div id="userInfo" class="user-info">
            <h3>Welcome!</h3>
            <p><strong>Username:</strong> <span id="infoUsername"></span></p>
            <p><strong>Email:</strong> <span id="infoEmail"></span></p>
            <p><strong>Name:</strong> <span id="infoName"></span></p>
            <p><strong>User ID:</strong> <span id="infoUid"></span></p>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const IDP_URL = 'http://localhost:8090';
        const CLIENT_ID = 'books-app';
        const REDIRECT_URI = 'http://localhost:3000/callback';

        // Check if there's an authorization code in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');

        // Check for existing token in localStorage
        function checkToken() {
            const token = localStorage.getItem('access_token');
            if (token) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
                loadUserInfo(token);
            }
        }

        // Load user info
        async function loadUserInfo(token) {
            try {
                const response = await fetch(`${IDP_URL}/oauth2/userinfo`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load user info');
                }

                const userInfo = await response.json();
                document.getElementById('infoUsername').textContent = userInfo.preferred_username || 'N/A';
                document.getElementById('infoEmail').textContent = userInfo.email || 'N/A';
                document.getElementById('infoName').textContent = userInfo.name || 'N/A';
                document.getElementById('infoUid').textContent = userInfo.sub || 'N/A';
            } catch (err) {
                console.error('Error loading user info:', err);
                showError('Failed to load user info');
                logout();
            }
        }

        // Handle authorization code callback
        async function handleCallback() {
            if (!code || !state) return;

            try {
                const params = new URLSearchParams({
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    client_id: CLIENT_ID
                });
                console.log('[handleCallback] Sending to token endpoint:', {
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    client_id: CLIENT_ID,
                    grant_type: 'authorization_code'
                });

                const response = await fetch(`${IDP_URL}/oauth2/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params.toString()
                });

                console.log('[handleCallback] Token response status:', response.status);
                const responseText = await response.text();
                console.log('[handleCallback] Token response body:', responseText);

                if (!response.ok) {
                    throw new Error('Failed to get token: ' + responseText);
                }

                const data = JSON.parse(responseText);
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('id_token', data.id_token);
                if (data.refresh_token) {
                    localStorage.setItem('refresh_token', data.refresh_token);
                }

                // Clear URL and reload
                window.history.replaceState({}, document.title, '/');
                checkToken();
            } catch (err) {
                console.error('Error handling callback:', err);
                showError('Failed to authenticate');
            }
        }

        // Login handler
        async function handleLogin(event) {
            event.preventDefault();

            // Generate state for CSRF protection
            const state = generateRandomString();
            sessionStorage.setItem('oauth_state', state);

            // Redirect to authorization endpoint
            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                response_type: 'code',
                scope: 'openid profile email',
                state: state
            });

            window.location.href = `${IDP_URL}/oauth2/authorize?${params.toString()}`;
        }

        // Logout handler
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('id_token');
            localStorage.removeItem('refresh_token');
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('form').reset();
        }

        // Go to signup
        function goToSignup() {
            const state = generateRandomString();
            sessionStorage.setItem('oauth_state', state);
            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                response_type: 'code',
                scope: 'openid profile email',
                state: state
            });
            window.location.href = `${IDP_URL}/oauth2/signup?${params.toString()}`;
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Generate random string for state
        function generateRandomString() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        // Initialize
        if (code && state) {
            handleCallback();
        } else {
            checkToken();
        }
    </script>
</body>

</html>
