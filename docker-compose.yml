version: "3"
services:
  postgres:
    image: library/postgres:13
    container_name: postgres-1
    restart: on-failure
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./postgres/:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"

  idp-service:
    build:
      context: ./
      dockerfile: ./src/idp-service/Dockerfile
    depends_on:
      - postgres
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=program
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=idp
    ports:
      - "8090:8090"
    networks:
      - default

  gateway-service:
    build:
      context: ./
      dockerfile: ./src/gateway-service/Dockerfile
    depends_on:
      - postgres
      - idp-service
      - kafka
    ports:
      - "8080:8080"

  reservation-service:
    build:
      context: ./
      dockerfile: ./src/reservation-service/Dockerfile
    depends_on:
      - postgres
      - idp-service
      - kafka
    ports:
      - "8070:8070"

  library-service:
    build:
      context: ./
      dockerfile: ./src/library-service/Dockerfile
    depends_on:
      - postgres
      - idp-service
      - kafka
    ports:
      - "8060:8060"

  rating-service:
    build:
      context: ./
      dockerfile: ./src/rating-service/Dockerfile
    depends_on:
      - postgres
      - idp-service
      - kafka
    ports:
      - "8050:8050"

  statistics-service:
    build:
      context: ./
      dockerfile: ./src/statistics-service/Dockerfile
    depends_on:
      - kafka
    ports:
      - "8040:8040"

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  zookeeper:
    image: 'bitnamilegacy/zookeeper:latest'
    ports:
      - '2181:2181'
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    restart: always

  kafka:
    image: 'bitnamilegacy/kafka:3.9'
    container_name: kafka
    hostname: kafka
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_CFG_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_CFG_ADVERTISED_LISTENERS:
        INTERNAL://kafka:19092,
        DOCKER://kafka:9092,
        EXTERNAL://localhost:29092
      KAFKA_CFG_LISTENERS:
        INTERNAL://:19092,
        DOCKER://:9092,
        EXTERNAL://:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:
        INTERNAL:PLAINTEXT,
        DOCKER:PLAINTEXT,
        EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    depends_on:
      - zookeeper
    healthcheck:
      test: kafka-topics.sh --bootstrap-server kafka:19092 --list
      interval: 5s
      timeout: 10s
      retries: 10

  init-kafka:
    image: 'bitnamilegacy/kafka:3.9'
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic __consumer_offsets --partitions 50 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic events --replication-factor 1 --partitions 1
      "

  kafka-ui:
    image: 'provectuslabs/kafka-ui:v0.7.2'
    container_name: kafka-ui
    ports:
      - "8180:8080"
    restart: always
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:19092
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  db-data: